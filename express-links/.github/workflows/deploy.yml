name: Deploy Vue App

on:
  push:
    branches:
      - main # Название вашей основной ветки (main или master)

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install and Build
        run: |
          npm install
          npm run build # Эта команда создаст папку dist

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Скрипт возьмет только содержимое dist и отправит в gh-pages
          branch: gh-pages
